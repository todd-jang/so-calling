name: Socalling CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: socalling/package-lock.json

    - name: Install Backend Dependencies
      run: |
        cd socalling
        npm install

    - name: Build Backend
      run: |
        cd socalling
        npm run build

    - name: Build Frontend
      run: |
        cd socalling/client
        npm install
        npm run build

    - name: Deploy Notification
      if: success()
      run: echo "🚀 Build successful! Ready for Vercel & Production."
