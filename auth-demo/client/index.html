<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>ArchScript | AI Intelligence Platform</title>
    <meta name="description" content="Express와 React 기반 실시간 AI 협업 플랫폼. 감성 분석, 자동 분류, 라이브 요약 서비스." />
    <meta name="author" content="ArchScript Team" />

    <!-- PWA: Theme & Mobile -->
    <!-- <meta name="theme-color" content="#38bdf8" /> -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ArchScript" />
    <link rel="apple-touch-icon" href="/vite.svg" />

    <!-- PWA: Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet" />

    <style>body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[PWA] SW registered, scope:', reg.scope))
            .catch(err => console.error('[PWA] SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
