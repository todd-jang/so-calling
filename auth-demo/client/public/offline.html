<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArchScript | Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      font-family: 'Inter', -apple-system, sans-serif;
      color: #f8fafc;
    }
    .offline-card {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 420px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
    }
    .icon { font-size: 64px; margin-bottom: 1.5rem; }
    h1 { font-size: 1.6rem; margin-bottom: 0.75rem; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 2rem; }
    button {
      background: #38bdf8; color: #0f172a; border: none;
      padding: 14px 36px; border-radius: 12px; font-weight: 700;
      font-size: 1rem; cursor: pointer; transition: transform .15s;
    }
    button:hover { transform: scale(1.04); }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="icon">📡</div>
    <h1>네트워크에 연결할 수 없습니다</h1>
    <p>현재 오프라인 상태입니다. Wi-Fi 또는 데이터 연결을 확인한 후 다시 시도해 주세요.</p>
    <button onclick="location.reload()">다시 시도</button>
  </div>
</body>
</html>
