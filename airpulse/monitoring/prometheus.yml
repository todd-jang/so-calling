global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # 1. Airpulse Hybrid Bridge Metrics
  - job_name: 'airpulse-bridge'
    static_configs:
      - targets: ['localhost:9090'] # Local Exporter
        labels:
          service: 'bridge-service'
          env: 'production'

  # 2. Future GPU Server Monitoring (Placeholder for 3 months later)
  - job_name: 'gpu-node-exporter'
    static_configs:
      - targets: ['gpu-server-ip:9100'] # Node Exporter
        labels:
          role: 'ai-inference'
  
  - job_name: 'nvidia-gpu-exporter'
    static_configs:
      - targets: ['gpu-server-ip:9400'] # NVIDIA GPU Exporter
        labels:
          model: 'ibm-granite'

  # 3. Socalling Backend Metrics
  - job_name: 'socalling-api'
    static_configs:
      - targets: ['localhost:4000']
