apiVersion: v1
kind: Service
metadata:
  name: airpulse-service
spec:
  selector:
    app: airpulse
    color: blue
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: airpulse-ingress
  annotations:
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: internet-facing
spec:
  rules:
  - host: dashboard.airpulse.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: airpulse-service
            port:
              number: 80
