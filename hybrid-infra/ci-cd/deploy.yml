name: Zero-Downtime Deploy to NKS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up NCP CLI
      run: |
        curl -o ncp-cli.tar.gz https://api.ncloud.com/cli/v1/download
        tar -xzf ncp-cli.tar.gz
        ./ncloud configure set ncloud_access_key_id ${{ secrets.NCP_ACCESS_KEY }}
        ./ncloud configure set ncloud_secret_access_key ${{ secrets.NCP_SECRET_KEY }}

    - name: Docker Build & Push to NCR
      run: |
        docker build -t ncr.ncloud.com/archscript/dashboard:${{ github.sha }} .
        docker login -u ${{ secrets.NCP_ACCESS_KEY }} -p ${{ secrets.NCP_SECRET_KEY }} ncr.ncloud.com
        docker push ncr.ncloud.com/archscript/dashboard:${{ github.sha }}

    - name: Blue-Green Deployment Logic
      run: |
        # 1. Update Green deployment with new image
        sed -i "s|image: .*|image: ncr.ncloud.com/archscript/dashboard:${{ github.sha }}|" k8s/deployment.yaml
        kubectl apply -f k8s/deployment.yaml
        
        # 2. Scale Green up
        kubectl scale deployment archscript-dashboard-green --replicas=3
        
        # 3. Wait for Green readiness
        kubectl rollout status deployment/archscript-dashboard-green
        
        # 4. Switch Service to Green
        kubectl patch service archscript-service -p '{"spec":{"selector":{"color":"green"}}}'
        
        # 5. Scale Blue down
        kubectl scale deployment archscript-dashboard-blue --replicas=0
