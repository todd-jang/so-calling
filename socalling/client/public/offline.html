<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Socalling | Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: 'Inter', -apple-system, sans-serif;
      color: #f8fafc;
    }
    .offline-card {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 420px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
    }
    .icon { font-size: 72px; margin-bottom: 1.5rem; }
    h1 { font-size: 1.8rem; margin-bottom: 0.75rem; letter-spacing: -0.02em; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 2.5rem; }
    .retry-btn {
      background: #38bdf8; color: #0f172a; border: none;
      padding: 16px 40px; border-radius: 12px; font-weight: 800;
      font-size: 1rem; cursor: pointer; transition: all 0.2s ease;
      box-shadow: 0 4px 14px 0 rgba(56, 189, 248, 0.39);
    }
    .retry-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(56, 189, 248, 0.45); }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="icon">✈️</div>
    <h1>네트워크 연결 확인 필요</h1>
    <p>현재 오프라인 상태입니다. 실시간 항공권 가격 정보를 업데이트하려면 네트워크 연결이 필요합니다.</p>
    <button class="retry-btn" onclick="location.reload()">새로고침</button>
  </div>
</body>
</html>
